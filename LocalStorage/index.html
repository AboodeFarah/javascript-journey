<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light and Dark mode switcher</title>

    <style>
        /* defult light mode style */
        body {
            background-color: #fff;
            color: #000;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;

        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        /* dark mode style */
        button.dark-mode {
            background-color: #333;
            color: #fff;
        }

        body.dark-mode {
            background-color: #333;
            color: #fff;
        }
    </style>

</head>

<body>

    <button id="modeToggle">Toggle dark Mode</button>

    <h2>welcome to the light and dark mode switcher</h2>
    <p>this is a simple example demonstrating how to use localStorge to remember user preferences</p>

    <script>
        const toggleButton = document.querySelector('#modeToggle');

        toggleButton.addEventListener('click', switchMode);

        function switchMode() {

            document.body.classList.toggle('dark-mode');
            toggleButton.classList.toggle('dark-mode');

            if (document.body.classList.contains('dark-mode')) {

                toggleButton.textContent = 'Toggle light Mode';
                localStorage.setItem('mode', 'dark');
            }
            else {
                toggleButton.textContent = 'Toggle dark Mode';
                localStorage.setItem('mode', 'light');
            }
        }

        window.addEventListener('DOMContentLoaded', function () {
            const saveMode = localStorage.getItem('mode');

            if (saveMode === 'dark') {
                document.body.classList.add('dark-mode');
                toggleButton.classList.add('dark-mode');
                toggleButton.textContent = 'Toggle light Mode';
            }
            else {
                toggleButton.textContent = 'Toggle dark Mode';
            }

        })
    </script>
</body>

</html>
