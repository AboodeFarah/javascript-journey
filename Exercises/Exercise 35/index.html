<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 35</title>
</head>
<body>

    <img id="image" src="https://images.unsplash.com/photo-1774249890206-081fd2e702d5?w=700&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxmZWF0dXJlZC1waG90b3MtZmVlZHwzfHx8ZW58MHx8fHx8" alt="Image" width="200">
    <button onclick="changeImage()">Change Image</button>


    <script>
        function changeImage(){

        const images = document.querySelector('#image');

        const url = prompt("Enter the new image URL:");
        const borderColor = prompt("Enter the border color:");
        const width = prompt("Enter the image width (in pixels):");
        const height = prompt("Enter the image height (in pixels):");
        const borderRadius = prompt("Enter the border radius (in pixels):");

        images.setAttribute('src', url);
        images.style.border = `2px solid ${borderColor}`;
        images.style.width = `${width}px`;
        images.style.height = `${height}px`;
        images.style.borderRadius = `${borderRadius}px`;

        
        }
    </script>
    
</body>
</html>
