<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 32</title>
</head>
<body>

    <h2>Exercise 32</h2>

    <h1 id="name"> Aboode </h1>
    <p class="paragraph"> This is a paragraph. </p>
    <p class="paragraph"> This is another paragraph. </p>



    <script>
        // Task: Use querySelector and querySelectorAll to select elements from an HTML structure of your choice. Log the selected elements to the console to verify the selections.

        //selecting the h1 element using querySelector
        const nameElement = document.querySelector('#name');
        console.log(nameElement);

        //selecting all paragraph elements using querySelectorAll
        const paragraphElements = document.querySelectorAll('.paragraph');
        console.log(paragraphElements);

    </script>

    
</body>
</html>
