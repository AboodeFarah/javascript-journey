<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1 id="header">Hello, World!</h1>
    <p class="text">This is a paragraph.</p>
    <p class="text">This is another paragraph.</p>

    <button>click</button>
    <button>click</button>

    <script>

        // Selecting an element by ID
        const header = document.getElementById('header');
        console.log(header); 

        // Selecting elements by class name
        const text = document.getElementsByClassName('text');
        console.log(text);

        // Selecting elements By tag name
        const buttons = document.getElementsByTagName('button');
        console.log(buttons);

        // Selecting elements using querySelector By ID
        const headerByQuery = document.querySelector('#header');
        console.log(headerByQuery);

        // Selecting elements using querySelector By Class
        const firstParagraph = document.querySelector('.text');
        console.log(firstParagraph);

        // Selecting all elements using querySelectorAll
        const allParagraphs = document.querySelectorAll('.text');
        console.log(allParagraphs);

        const allButtons = document.querySelectorAll('button');
        console.log(allButtons);

    </script>

</body>
</html>
