<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
</head>
<body>
    
    <form id="registrationForm">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username"><br><br>

        <label for="email">Email:</label>
        <input type="text" id="email" name="email"><br><br>

        <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br><br>

        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" name="confirmPassword"><br><br>

        <button type="submit">Register</button>
    </form>

    <p id="error" style="color: red;"></p>

    <script>
        document.querySelector('#registrationForm').addEventListener('submit', function (event) {
                event.preventDefault(); // Prevent form submission

                const username = document.querySelector('#username').value;
                const email = document.querySelector('#email').value;
                const password = document.querySelector('#password').value;
                const confirmPassword = document.querySelector('#confirmPassword').value;
                const error = document.querySelector('#error');

                //checking username
                if (username === ''){
                    error.textContent = 'Username is required.';
                    console.log('Username is required.');
                    return;

                }
                else if(username.length < 3){
                    error.textContent = 'Username must be at least 3 characters long.';
                    console.log('Username must be at least 3 characters long.');

                    return;
                }

                //Regular Expressions (RegEx)
                const emailPattern = /^[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.[A-Za-z]{2,}$/;

                if (email === ''){
                    error.textContent = 'Email is required.';
                    console.log('Email is required.');
                    return;
                }
                else if(!email.match(emailPattern)){
                    error.textContent = ' please enter a valid email adress. ';
                    console.log('Please enter a valid email address.');
                    return;
                }

                //checking password

                const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

                if (password === ''){
                    error.textContent = 'Password is required.';
                    return;
                }
                else if (!password.match(passwordPattern)){
                    error.textContent = 'Password must be at least 8 characters long and include at least one uppercase letter, one lowercase letter, one number, and one special character.';
                    return;
                }

                //checking confirm password
                if (password !== confirmPassword){
                    error.textContent = 'Passwords do not match.';
                    return;
                }


                
                



                error.textContent = 'Registration successful!';

        });




    </script>

</body>
</html>
